<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房地产户型盘点工具</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header>
    <h1>房地产项目户型盘点工具</h1>
    <p class="subtitle">上传天朗房研网截图，自动识别并生成户型盘点 Excel（支持多项目批量处理）</p>
  </header>

  <main>
    <!-- 已保存项目 -->
    <section class="card" id="savedSection">
      <div class="queue-header">
        <h2>已保存项目</h2>
        <span id="savedCount" class="badge">加载中...</span>
      </div>
      <div style="margin-bottom:12px">
        <input type="text" id="searchBox" placeholder="搜索项目名称..." style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px">
      </div>
      <div id="savedList" class="queue-list">
        <p class="empty-hint">暂无保存的项目</p>
      </div>
    </section>

    <!-- 项目队列 -->
    <section class="card" id="queueSection">
      <div class="queue-header">
        <h2>项目队列</h2>
        <span id="queueCount" class="badge">0 个项目</span>
      </div>
      <div id="queueList" class="queue-list">
        <p class="empty-hint">还没有添加项目，请在下方添加</p>
      </div>
      <div class="queue-actions" id="queueActions" style="display:none">
        <button id="processAllBtn" class="btn-primary">全部处理并导出</button>
        <button id="clearQueueBtn" class="btn-secondary">清空队列</button>
      </div>
      <div id="batchProgress" class="progress hidden"></div>
    </section>

    <!-- 添加/编辑项目 -->
    <section class="card" id="formSection">
      <h2 id="formTitle">添加项目</h2>

      <div class="form-row">
        <div class="form-group">
          <label>项目名称 <span class="required">*</span></label>
          <input type="text" id="projectName" placeholder="如：华曦府金安">
        </div>
        <div class="form-group">
          <label>板块</label>
          <input type="text" id="plate" placeholder="手动填写">
        </div>
        <div class="form-group">
          <label>开盘时间</label>
          <input type="text" id="openDate" placeholder="如：2024-06">
        </div>
        <div class="form-group">
          <label>容积率</label>
          <input type="text" id="plotRatio" placeholder="如：2.5">
        </div>
      </div>

      <!-- 供应截图 -->
      <div class="upload-group">
        <h3>整盘供应截图 <span class="required">*</span></h3>
        <div class="drop-zone" id="supplyDrop">
          <input type="file" id="supplyFile" accept="image/*" hidden>
          <div class="drop-content">
            <span class="icon">📊</span>
            <p>拖拽或<span class="link">点击上传</span></p>
          </div>
          <img id="supplyPreview" class="preview hidden">
        </div>
      </div>

      <!-- 成交截图 -->
      <div class="upload-group">
        <h3>整盘成交截图 <span style="color:#999;font-weight:normal;font-size:12px">(可选)</span></h3>
        <div class="drop-zone" id="transDrop">
          <input type="file" id="transFile" accept="image/*" hidden>
          <div class="drop-content">
            <span class="icon">📈</span>
            <p>拖拽或<span class="link">点击上传</span></p>
          </div>
          <img id="transPreview" class="preview hidden">
        </div>
      </div>

      <!-- 月度成交截图 -->
      <div class="upload-group">
        <h3>特定月份成交截图 <span style="color:#999;font-weight:normal;font-size:12px">(可选)</span></h3>
        <div id="monthlyContainer">
          <div class="monthly-row" data-index="0">
            <input type="text" class="month-label" placeholder="如：2024-05">
            <div class="drop-zone month-drop">
              <input type="file" accept="image/*" hidden>
              <div class="drop-content"><span class="icon">📅</span><p>拖拽或<span class="link">点击上传</span></p></div>
              <img class="preview hidden">
            </div>
            <button class="btn-remove" title="移除">×</button>
          </div>
        </div>
        <button id="addMonth" class="btn-secondary">+ 添加月份</button>
      </div>

      <div class="form-actions">
        <button id="saveProjectBtn" class="btn-primary">保存到队列</button>
        <span id="editingIndex" style="display:none"></span>
      </div>
    </section>

    <!-- 结果 -->
    <section id="resultSection" class="card hidden">
      <h2>处理结果</h2>
      <div id="resultErrors" class="errors hidden"></div>
      <button id="downloadBtn" class="btn-primary">下载 Excel</button>
      <button id="resetBtn" class="btn-secondary">重新开始</button>
    </section>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
